name: bluesnap
description: Bluetooth-first local social app. Zero internet required.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Bluetooth & Nearby
  flutter_blue_plus: ^1.31.0
  nearby_connections: ^4.0.0

  # Media
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  photo_view: ^0.14.0
  camera: ^0.11.0
  file_picker: ^8.1.2
  open_filex: ^4.5.0
  share_plus: ^10.0.2

  # Location (real coordinates for location sharing)
  geolocator: ^13.0.1

  # Background reachability + local notifications
  flutter_foreground_task: ^8.10.0
  flutter_local_notifications: ^17.2.3

  # Audio Recording & Playback
  record: ^5.1.2
  audioplayers: ^6.1.0

  # Real-time Communication (Audio/Video Calls)
  flutter_webrtc: ^0.12.4

  # Crypto & IDs
  uuid: ^4.2.2
  cryptography: ^2.7.0

  # Security: app-lock + hardware-backed key storage
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0

  # UI
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0

  # Permissions
  permission_handler: ^11.2.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.2
  collection: ^1.18.0
  iconsax_flutter: ^1.0.1

dependency_overrides:
  record_linux: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  image: ^4.2.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 29
  adaptive_icon_background: "assets/icon/app_icon_bg.png"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/splash_logo.png
  android_12:
    color: "#FFFFFF"
    image: assets/icon/splash_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/icon/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-400.ttf
          weight: 400
        - asset: assets/fonts/Inter-500.ttf
          weight: 500
        - asset: assets/fonts/Inter-600.ttf
          weight: 600
        - asset: assets/fonts/Inter-700.ttf
          weight: 700
        - asset: assets/fonts/Inter-800.ttf
          weight: 800
        - asset: assets/fonts/Inter-900.ttf
          weight: 900
